name: CI - CampusOps API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Verificar sintaxe
        run: npm run check

      - name: Verificar padrão de código
        run: npm run lint

      - name: Build da imagem Docker
        run: docker build -t campusops-api .

      - name: Executar testes automatizados
        run: npm test